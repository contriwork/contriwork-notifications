version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "python"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "nuget"
    directory: "/csharp"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "dotnet"]
    groups:
      dotnet-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/typescript"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "npm"]
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directory: "/python"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker", "python"]

  - package-ecosystem: "docker"
    directory: "/csharp"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker", "dotnet"]

  - package-ecosystem: "docker"
    directory: "/typescript"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker", "npm"]
