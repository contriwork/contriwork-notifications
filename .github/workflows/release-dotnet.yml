name: release-dotnet

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-dotnet-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-publish:
    name: pack + publish to NuGet
    runs-on: ubuntu-latest
    environment:
      name: nuget
      url: https://www.nuget.org/packages/Contriwork.PackageName
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: csharp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: verify VERSION matches tag
        run: |
          VERSION=$(tr -d '[:space:]' < ../VERSION)
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::VERSION ($VERSION) does not match tag ($TAG)"
            exit 1
          fi
          echo "PKG_VERSION=$VERSION" >> "$GITHUB_ENV"

      - uses: actions/setup-dotnet@87b7050bc53ea08284295505d98d2aa94301e852 # v4.2.0
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore
      - run: dotnet build -c Release --no-restore -p:Version=${{ env.PKG_VERSION }}
      - run: dotnet test --no-build -c Release
      - run: dotnet pack -c Release --no-build -p:Version=${{ env.PKG_VERSION }} -o ./artifacts

      - name: login to NuGet via OIDC
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1.1.0
        id: nuget-login
        with:
          # NuGet's trusted-publisher user lookup is CASE-SENSITIVE and must
          # match the nuget.org account / organization name character-for-
          # character. Different packages may be owned by different NuGet
          # accounts, so we read the value from a repo-level Actions
          # variable rather than hardcoding it in the template.
          # Configure: Settings → Secrets and variables → Actions →
          # Variables → `NUGET_ACCOUNT = <exact account name>`.
          user: ${{ vars.NUGET_ACCOUNT }}

      - name: publish to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
