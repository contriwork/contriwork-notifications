name: release-npm

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-publish:
    name: build + publish to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@contriwork/notifications
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: verify VERSION matches tag
        run: |
          VERSION=$(tr -d '[:space:]' < ../VERSION)
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::VERSION ($VERSION) does not match tag ($TAG)"
            exit 1
          fi
          echo "PKG_VERSION=$VERSION" >> "$GITHUB_ENV"

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 9
          run_install: false

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: set package version
        run: npm version "${{ env.PKG_VERSION }}" --no-git-tag-version --allow-same-version

      - name: publish to npm with provenance
        # Hybrid auth: NODE_AUTH_TOKEN is the npm-side registry token (org
        # member), and `--provenance` lets npm sign the publish using the
        # workflow's GitHub OIDC id-token (`id-token: write` permission
        # above). Provenance therefore stays cryptographically verifiable
        # on sigstore even though registry auth is token-based.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
