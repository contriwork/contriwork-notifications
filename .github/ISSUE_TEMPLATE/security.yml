name: Security issue
description: Redirect — do not file security reports here.
title: "[security] DO NOT FILE HERE"
labels: ["invalid"]
body:
  - type: markdown
    attributes:
      value: |
        # STOP — do not file a public issue.

        Security vulnerabilities must be reported **privately** so we can ship a fix before the issue becomes exploitable.

        ## Report via GitHub private vulnerability reporting

        1. Go to the **Security** tab of this repository.
        2. Click **Report a vulnerability**.
        3. Fill in the form.

        We acknowledge within **3 business days** and aim to ship a fix within **30 days** for HIGH/CRITICAL issues.

        ## Alternative channel

        If GitHub private reporting is unavailable, email **security@contriwork.dev** (PGP key TBA).

        Please close this issue after reading. Public reports will be closed without comment and reopened privately.

  - type: checkboxes
    id: acknowledged
    attributes:
      label: Acknowledgement
      options:
        - label: I understand this channel is not for security reports and I will use private disclosure instead.
          required: true
